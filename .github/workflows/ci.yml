name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: Build and test (JDK ${{ matrix.java }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]
        java: [ '17', '21', '25' ]

    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and test with Maven
        run: mvn -B -V verify

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports-${{ matrix.os }}-jdk${{ matrix.java }}
          path: target/surefire-reports/
          retention-days: 3

  coverage:
    name: Code coverage
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Generate coverage report
        run: mvn -B verify jacoco:report

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: target/site/jacoco/
          retention-days: 7

  results:
    name: CI results
    runs-on: ubuntu-latest
    needs: [ build, coverage ]
    if: always()
    steps:
      - name: Report overall status
        run: |
          echo "build result: ${{ needs.build.result }}"
          echo "coverage result: ${{ needs.coverage.result }}"
          if [ "${{ needs.build.result }}" != 'success' ] || [ "${{ needs.coverage.result }}" != 'success' ]; then
            exit 1
          fi

