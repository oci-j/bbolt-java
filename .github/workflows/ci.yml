name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: Build and test (JDK ${{ matrix.java }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]
        java: [ '17', '21', '25' ]

    steps:
      - name: Checkout source
        uses: actions/checkout@v7

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and test with Maven
        run: mvn -B -V verify

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports-${{ matrix.os }}-jdk${{ matrix.java }}
          path: target/surefire-reports/
          retention-days: 3

  coverage:
    name: Code coverage
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout source
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Generate coverage report
        run: mvn -B verify jacoco:report

      - name: Print coverage summary
        run: |
          python3 - <<'PY'
          import xml.etree.ElementTree as ET
          import os
          jacoco_xml = 'target/site/jacoco/jacoco.xml'
          if not os.path.exists(jacoco_xml):
              print('JaCoCo XML report not found')
              exit(0)
          root = ET.parse(jacoco_xml).getroot()
          for counter in root.findall('counter'):
              if counter.get('type') in ('LINE', 'BRANCH'):
                  missed = int(counter.get('missed', 0))
                  covered = int(counter.get('covered', 0))
                  total = missed + covered
                  percent = (covered / total * 100) if total > 0 else 0
                  print(f"{counter.get('type')}: {covered}/{total} ({percent:.2f}%)")
          PY

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: target/site/jacoco/
          retention-days: 7

  coverage-pages:
    name: Deploy coverage report to GitHub Pages
    runs-on: ubuntu-latest
    needs: coverage
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
    steps:
      - name: Download coverage report
        uses: actions/download-artifact@v8
        with:
          name: coverage-report
          path: coverage-report

      - name: Generate coverage badge JSON
        run: |
          mkdir -p pages/report
          python3 - <<'PY'
          import json
          import xml.etree.ElementTree as ET
          root = ET.parse('coverage-report/jacoco.xml').getroot()
          pct = 0
          for counter in root.findall('counter'):
              if counter.get('type') == 'INSTRUCTION':
                  covered = int(counter.get('covered', 0))
                  missed = int(counter.get('missed', 0))
                  total = covered + missed
                  pct = round(covered / total * 100) if total > 0 else 0
                  break
          color = 'green' if pct >= 80 else 'yellow' if pct >= 60 else 'red'
          with open('pages/coverage.json', 'w') as f:
              json.dump({
                  "schemaVersion": 1,
                  "label": "coverage",
                  "message": f"{pct}%",
                  "color": color
              }, f)
          print(f"coverage: {pct}% ({color})")
          PY
          cp -R coverage-report/* pages/report/
          mv pages/report/index.html pages/report/coverage.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: pages/

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v5

  results:
    name: CI results
    runs-on: ubuntu-latest
    needs: [ build, coverage ]
    if: always()
    steps:
      - name: Report overall status
        run: |
          echo "build result: ${{ needs.build.result }}"
          echo "coverage result: ${{ needs.coverage.result }}"
          if [ "${{ needs.build.result }}" != 'success' ] || [ "${{ needs.coverage.result }}" != 'success' ]; then
            exit 1
          fi

